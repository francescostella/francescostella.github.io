<div class="uk-section">  
  <div class="uk-container uk-container-large">
    <h1>Works</h1>

    <div class="uk-child-width-1-2 uk-child-width-1-3@s uk-child-width-1-4@m" uk-grid>
      <div>
        <a
          routerLink="/work/{{ work.id }}"
          routerLinkActive="active"
          *ngFor="let work of listWorks"
          class="uk-link-reset"
        >
          <div class="uk-card uk-card-default uk-card-hover">
            <div *ngIf="work.cover" class="uk-card-media-top">
              <img
                src="http://134.209.170.209:1337{{ work.cover.url }}"
                alt=""
                height="100"
              />
            </div>
            <div class="uk-card-body">
              <p
                id="client"
                *ngIf="work.client"
                class="uk-text-uppercase"
              >
                Client: {{ work.client.name }}
              </p>
              <p id="title" class="uk-text-large">{{ work.name }}</p>
            </div>
          </div>
        </a>
      </div>
    </div>
  </div>
</div>
