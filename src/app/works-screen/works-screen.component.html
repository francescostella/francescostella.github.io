<section class="works-screen uk-section">  
  <div class="uk-container uk-margin-medium-top">
    <div class="uk-height-small uk-flex uk-flex-center uk-flex-middle uk-background-cover uk-light uk-inline"
      [style.background-image]="
        'url(https://source.unsplash.com/qjnAnF0jIGk/1280x720)'
      " uk-img >
    </div>
    <h1 class="uk-heading-medium uk-text-uppercase">Works</h1>

    <!-- CONTENTFUL API -->
    <div class="uk-child-width-1-2 uk-child-width-1-3@s uk-child-width-1-4@m uk-grid-match" uk-grid>
      <a
        routerLink="/work/{{ work.id }}"
        routerLinkActive="active"
        *ngFor="let work of workItems"
        class="uk-link-reset"
      >
        <div class="uk-card uk-card-default uk-card-hover">
          <div *ngIf="work.fields.cover" class="uk-card-media-top">
            <img
              src="{{getCoverUrl(work)}}"
              alt=""
              height="100"
            />
          </div>
          <div class="uk-card-body">
            <p
              *ngIf="work.fields.client"
              class="uk-text-meta uk-text-uppercase"
            >
              {{ getClientName(work) }}

            </p>
            <p class="uk-text-small uk-text-bold">{{ work.fields.name }}</p>
          </div>
        </div>
      </a>
    </div>

    <!-- STRAPI API -->
    <div class="uk-child-width-1-2 uk-child-width-1-3@s uk-child-width-1-4@m uk-grid-match" uk-grid>
      <a
        routerLink="/work/{{ work.id }}"
        routerLinkActive="active"
        *ngFor="let work of listWorks"
        class="uk-link-reset"
      >
        <div class="uk-card uk-card-default uk-card-hover">
          <div *ngIf="work.cover" class="uk-card-media-top">
            <img
              src="{{apiUrl}}{{ work.cover.url }}"
              alt=""
              height="100"
            />
          </div>
          <div class="uk-card-body">
            <p
              *ngIf="work.client"
              class="uk-text-meta uk-text-uppercase"
            >
              {{ work.client.name }}
            </p>
            <p class="uk-text-small uk-text-bold">{{ work.name }}</p>
          </div>
        </div>
      </a>
    </div>
  </div>
</section>
